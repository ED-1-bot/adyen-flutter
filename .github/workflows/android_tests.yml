name: Android unit tests

on:
  workflow_call:
    inputs:
      flutter-version:
        description: 'Flutter version'
        required: false
        default: '3.44.x'
        type: string

permissions:
  contents: read

jobs:
  android_tests:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: example/android
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'zulu'
          java-version: 17

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: 'stable'
          cache: true

      - run: flutter doctor -v
      - run: flutter clean
      - run: flutter pub get

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: '8.13'

      - name: Init gradle wrapper
        run: gradle wrapper

      - name: Lint check
        run: ./gradlew :adyen_checkout:ktlintCheck :adyen_checkout:lintReportDebug

      - name: Unit tests with code coverage reporting
        run: ./gradlew :adyen_checkout:jacocoTestReport

      - name: Cache android reports
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: save-android-reports
        with:
          path: example/build/adyen_checkout/reports
          key: android-reports